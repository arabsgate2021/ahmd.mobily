<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - لوحة تحكم المبيعات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* التنسيقات الأصلية التي كنت تستخدمها */
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        .navbar { background-color: #2e1065; display: flex; gap: 20px; padding: 15px 20px; border-radius: 12px; margin: 10px; }
        .navbar a { color: #fff; text-decoration: none; font-weight: 700; font-size: 13px; }
        .container { padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: 38% 62%; gap: 20px; }
        .content-box { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        h3 { color: #2e1065; font-weight: 800; font-size: 13px; margin-top: 0; border-right: 4px solid #3b82f6; padding-right: 8px; }
        
        .yearly-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .yearly-table th, .yearly-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; }
        
        .stats-cards { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; padding: 10px; border-radius: 10px; color: white; text-align: center; }
        .bg-blue { background: #3b82f6; } .bg-green { background: #22c55e; } 
        .bg-yellow { background: #facc15; } .bg-purple { background: #8b5cf6; }
        
        .charts-row { display: flex; gap: 10px; justify-content: center; }
        .chart-container { width: 120px; height: 120px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">الرئيسية</a>
        <a href="#">الزيارات</a>
        <a href="#">الفرص</a>
        <a href="#">العملاء</a>
    </nav>

    <div class="container">
        <div class="dashboard-grid">
            <div class="content-box">
                <h3>سجل الأهداف</h3>
                <table class="yearly-table">
                    <thead><tr><th>الشهر</th><th>الهدف</th><th>الزيارات</th></tr></thead>
                    <tbody id="monthsBody"></tbody>
                </table>
            </div>

            <div>
                <div class="stats-cards">
                    <div class="stat-card bg-blue">الهدف<br>180,000</div>
                    <div class="stat-card bg-green">المبيعات<br>14,210</div>
                </div>
                <div class="content-box">
                    <h3>تحليل الأداء</h3>
                    <div class="charts-row">
                        <div class="chart-container"><canvas id="myChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إعداد الجدول
        const months = ["يناير", "فبراير", "مارس"];
        const tbody = document.getElementById('monthsBody');
        months.forEach(m => {
            tbody.innerHTML += `<tr><td>${m}</td><td>5000</td><td>10</td></tr>`;
        });

        // إعداد الرسم البياني
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: [80, 20], backgroundColor: ['#22c55e', '#e2e8f0'] }] }
        });
    </script>
</body>
</html>
