<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل نشاط تفاصيل العملاء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- تغيير اسم الجزء الرئيسي حسب طلبك -->
        <h2 class="page-title">سجل نشاط تفاصيل العملاء</h2>

        <!-- شريط التبويبات الجديد: يبدأ من بداية الصفحة والمربعات صغيرة -->
        <div class="records-ribbon">
            <!-- زر المرفقات يحتوي على علامة المرفق في الأول كزر صغير -->
            <button class="compact-tab-btn active" onclick="switchTab('attachments')">
                <span class="attachment-icon">📎</span> المرفقات
            </button>
            <button class="compact-tab-btn" onclick="switchTab('orders')">سجل الطلبات</button>
            <button class="compact-tab-btn" onclick="switchTab('visits')">سجل الزيارات</button>
        </div>

        <!-- حفل رفع الملفات المخفي الذي يتم استدعاؤه برمجياً -->
        <input type="file" id="hiddenFileInput" style="display: none;" onchange="handleFileUpload(event)">

        <!-- قسم محتوى التبويبات -->
        <div class="tab-content-wrapper">
            
            <!-- حاوية المرفقات (تظهر بشكل افتراضي) -->
            <div id="attachmentsTab" class="tab-content">
                <div class="tab-header-actions">
                    <button class="upload-trigger-btn" onclick="triggerFileUpload()">اضغط لإرفاق ملف جديد +</button>
                </div>
                <!-- مكان ظهور المرفقات الثابتة للقراءة فقط -->
                <div id="attachmentsContainer" class="records-list-container">
                    <p class="empty-message">لا توجد مرفقات حالياً. اضغط على الزر بالأعلى لإضافة أول ملف.</p>
                </div>
            </div>

            <!-- حاوية سجل الطلبات (فارغة لملئها برمجياً حسب بقية النظام) -->
            <div id="ordersTab" class="tab-content" style="display: none;">
                <div id="ordersContainer" class="records-list-container">
                    <p class="empty-message">لا توجد طلبات مسجلة لهذا العميل.</p>
                </div>
            </div>

            <!-- حاوية سجل الزيارات (فارغة لملئها برمجياً حسب بقية النظام) -->
            <div id="visitsTab" class="tab-content" style="display: none;">
                <div id="visitsContainer" class="records-list-container">
                    <p class="empty-message">لا توجد زيارات مسجلة لهذا العميل.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
