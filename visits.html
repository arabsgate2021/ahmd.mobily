<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ASGate - نظام الزيارات</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2e1065; border-right: 4px solid #3b82f6; padding-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #4c1d95; color: white; padding: 12px; }
        td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        .btn-add { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>سجل الزيارات</h2>
    <button class="btn-add" onclick="addRow()">+ إضافة زيارة جديدة</button>
    
    <table id="visitsTable">
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>الشركة</th>
                <th>الحالة</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // دالة إضافة صف جديد
    function addRow() {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${new Date().toLocaleDateString('ar-SA')}</td>
            <td>شركة جديدة</td>
            <td>قيد الانتظار</td>
            <td><button class="btn-del" onclick="this.parentElement.parentElement.remove()">حذف</button></td>
        `;
        saveData();
    }

    // حفظ البيانات في المتصفح
    function saveData() {
        const data = document.getElementById('tableBody').innerHTML;
        localStorage.setItem('asgate_visits_data', data);
    }

    // استرجاع البيانات عند فتح الصفحة
    window.onload = function() {
        const saved = localStorage.getItem('asgate_visits_data');
        if (saved) document.getElementById('tableBody').innerHTML = saved;
    };
</script>

</body>
</html>
