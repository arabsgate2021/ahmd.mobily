<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - الزيارات</title>
    <!-- الخطوط والمكتبات الخارجية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- ربط ملف التنسيقات الخارجي الموحد -->
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadSavedData()">

<div class="dashboard-container">
    <!-- شريط التنقل العلوي الموحد لنظام ASGate -->
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html" class="active">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="main-content">
        <!-- شريط الإجراءات والبحث والإحصائيات -->
        <div class="action-bar">
            <button class="btn-top btn-add" onclick="insertNewRow()">
                <i class="fas fa-plus"></i> إضافة زيارة جديدة
            </button>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="بحث 🔍" onkeyup="debouncedFilterTable()">
            </div>
            
            <div class="stats-bar-visit">
                <div class="stat-item">الكل: <span id="stat-total" class="stat-val">0</span></div>
                <div class="stat-item">هذا الشهر: <span id="stat-month" class="stat-val">0</span></div>
                <div class="stat-item">اليوم: <span id="stat-today" class="stat-val">0</span></div>
                <div class="stat-divider">|</div>
                <div class="stat-item">العائد الإجمالي: <span id="stat-value-total" class="stat-val style-total-val">0</span></div>
                <div class="stat-item">عائد الشهر: <span id="stat-value-month" class="stat-val style-month-val">0</span></div>
            </div>

            <div class="bulk-action-wrapper">
                <button class="btn-bulk-trigger" onclick="toggleDropdown(event, this)">
                    إجراءات جماعية <i class="fas fa-chevron-down opacity-chevron"></i>
                </button>
                <div class="dropdown-menu">
                    <button onclick="handleBulkAction('تغيير المالك')"><i class="fas fa-user-edit"></i> تغيير المالك</button>
                    <button onclick="handleBulkAction('تصدير')"><i class="fas fa-file-excel"></i> تصدير للإكسيل</button>
                    <button onclick="handleBulkAction('طباعة')"><i class="fas fa-print"></i> طباعة</button>
                    <hr class="dropdown-divider">
                    <button class="del-btn" onclick="handleBulkAction('حذف')"><i class="fas fa-trash-alt"></i> حذف المحدد</button>
                </div>
            </div>
        </div>
        
        <!-- جدول البيانات الأساسي للهيكل المرن الخاص بالزيارات -->
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-select"><input type="checkbox" onclick="toggleAllCheckboxes(this)"></th>
                        <th class="col-company">الشركة</th>
                        <th class="col-address">العنوان</th> 
                        <th class="col-manager">المسؤول</th>
                        <th class="col-mobile">رقم التواصل</th>
                        <th class="col-email">الإيميل</th>
                        <th class="col-record">السجل</th>
                        <th class="col-date">تاريخ الزيارة</th>
                        <th class="col-service">الخدمة</th>
                        <th class="col-val">القيمة</th>
                        <th class="col-notes">الملاحظات</th>
                        <th class="col-status">الحالة</th>
                        <th class="col-edit">آخر تعديل</th>
                        <th class="col-owner">المالك</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- قسم سجل الأنشطة الأخير القابل للتوسيع -->
        <div id="activityLogSection" class="activity-log-section">
            <div class="activity-log-header-container">
                <div class="activity-log-title"><i class="fas fa-history"></i> سجل النشاطات الأخير</div>
                <button id="toggleExpandBtn" class="btn-toggle-expand" onclick="toggleLogExpansion()" title="توسيع / تقليص">
                    <i class="fas fa-expand-alt"></i>
                </button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>
</div>

<!-- النافذة المنبثقة لإدارة واستعراض المحادثات وسجل الملاحظات -->
<div id="noteModal" class="modal-notes">
    <div class="modal-notes-content">
        <div class="modal-notes-title-wrapper">
            <i class="fas fa-sticky-note note-icon-color"></i> سجل ملاحظات الزيارة
        </div>
        <div id="historyLog" class="history-log"></div>
        <textarea id="modalTextArea" class="note-area" placeholder="أدخل تفاصيل الملاحظة هنا..."></textarea>
        <div class="modal-actions-wrapper">
            <button onclick="closeNote()" class="btn-modal-cancel">إلغاء</button>
            <button onclick="saveNote()" class="btn-modal-save">حفظ الملاحظة</button>
        </div>
    </div>
</div>

<!-- ربط ملف العمليات البرمجية والتفاعلية الخارجي -->
<script src="script.js"></script>
</body>
</html>
