<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customer-details.css">
</head>
<body onload="loadClientData()">

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="visits.html">الزيارات</a>
            <a href="opportunities.html">الفرص البيعية</a>
            <a href="customers.html" class="active-link">العملاء</a>
            <a href="sales.html">المبيعات</a>
        </div>
        <div class="nav-actions">
            <button class="btn-back" onclick="goBackAndFocus()">
                <span>↩</span> رجوع للقائمة
            </button>
        </div>
    </div>
</nav>

<main class="main-container">
    <div class="card company-card">
        <div class="card-header">
            <h2 class="section-title">🏢 بيانات المنشأة</h2>
            <span class="badge status-active">عميل مسجل</span>
        </div>
        <div class="card-body">
            <div class="info-grid">
                <div class="info-group">
                    <label>اسم الشركة</label>
                    <span id="c-name" class="highlight-text">-</span>
                </div>
                <div class="info-group">
                    <label>السجل التجاري (1)</label>
                    <span id="c-cr1" class="mono-text">-</span>
                </div>
                <div class="info-group">
                    <label>السجل التجاري (2)</label>
                    <span id="c-cr2" class="mono-text">-</span>
                </div>
                <div class="info-group">
                    <label>المدينة</label>
                    <span id="c-city">-</span>
                </div>
                <div class="info-group">
                    <label>الحي</label>
                    <span id="c-district">-</span>
                </div>
                <div class="info-group">
                    <label>منشأ العميل</label>
                    <span id="c-source">-</span>
                </div>
                <div class="info-group">
                    <label>مالك العميل</label>
                    <span id="c-owner">-</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card manager-card">
        <div class="card-header">
            <h2 class="section-title">👤 الأشخاص المسؤولون</h2>
            <button class="btn-primary" onclick="addNewManagerRow()">+ إضافة مسؤول جديد</button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="modern-table">
                    <thead>
                        <tr>
                            <th style="width: 5%;">الرئيسي</th>
                            <th style="width: 20%;">الاسم</th>
                            <th style="width: 15%;">رقم التواصل</th>
                            <th style="width: 15%;">رقم آخر</th>
                            <th style="width: 15%;">البريد الإلكتروني</th>
                            <th style="width: 12%;">المنصب/الوظيفة</th>
                            <th style="width: 10%;">التاريخ</th>
                            <th style="width: 8%;">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="managerTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card tabs-card">
        <div class="tabs-header">
            <div class="tabs-wrapper">
                <button class="tab-btn active" id="btn-o" onclick="openTab('o-history')">🛒 سجل الطلبات</button>
                <button class="tab-btn" id="btn-v" onclick="openTab('v-history')">📅 سجل الزيارات</button>
                <button class="tab-btn" id="btn-a" onclick="openTab('attachments')">📁 المرفقات</button>
            </div>
        </div>
        <div class="card-body" id="display-frame">
            <h3 id="frame-title" class="tab-content-title">🛒 سجل الطلبات</h3>
            <div id="table-content" class="tab-content-area"></div>
        </div>
    </div>
</main>

<script src="customer-details.js"></script>
</body>
</html>
