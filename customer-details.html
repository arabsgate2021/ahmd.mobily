<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل العميل | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customer-details.css">
</head>
<body onload="loadClientData()">

<nav class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="visits.html">الزيارات</a>
    <a href="opportunities.html">الفرص البيعية</a>
    <a href="customers.html" class="active-link">العملاء</a>
    <a href="sales.html">المبيعات</a>
</nav>

<div class="company-header-wrapper">
    <div class="back-container">
        <button class="back-btn" onclick="goBackAndFocus()">رجوع</button>
    </div>
    <div class="compact-section">
        <div class="row-wrapper">
            <div class="section-label">🏢 بيانات المنشأة:</div>
            <div class="data-row-inline">
                <div class="info-item"><label>الشركة:</label><span id="c-name">-</span></div>
                <div class="info-item"><label>السجل1:</label><span id="c-cr1">-</span></div>
                <div class="info-item"><label>سجل2:</label><span id="c-cr2">-</span></div>
                <div class="info-item"><label>المدينة:</label><span id="c-city">-</span></div>
                <div class="info-item"><label>الحي:</label><span id="c-district">-</span></div>
                <div class="info-item"><label>منشأ العميل:</label><span id="c-source">-</span></div>
                <div class="info-item"><label>مالك العميل:</label><span id="c-owner">-</span></div>
            </div>
        </div>
    </div>
</div>

<div class="manager-header-wrapper">
    <div class="compact-section">
        <div class="manager-title-bar">
            <div class="section-label" style="min-width: fit-content; margin-bottom: 0;">👤 الشخص المسؤول</div>
            <button class="add-mgr-btn" onclick="addNewManagerRow()">+ إضافة مسؤول</button>
        </div>
        
        <table class="mgr-table">
            <thead>
                <tr>
                    <th style="width: 8%;">الرئيسي</th>
                    <th style="width: 17%;">الاسم</th>
                    <th style="width: 15%;">رقم التواصل</th>
                    <th style="width: 15%;">رقم آخر</th>
                    <th style="width: 18%;">الايميل</th>
                    <th style="width: 12%;">الوظيفة</th>
                    <th style="width: 15%;">التاريخ</th>
                    <th style="width: 10%;">الإجراء</th>
                </tr>
            </thead>
            <tbody id="managerTableBody"></tbody>
        </table>
    </div>
</div>

<div class="full-width-container">
    <div class="control-strip">
        <div class="tabs-wrapper">
            <button class="tab-btn active" id="btn-o" onclick="openTab('o-history')">سجل الطلبات</button>
            <button class="tab-btn" id="btn-a" onclick="openTab('attachments')">المرفقات</button>
            <button class="tab-btn" id="btn-v" onclick="openTab('v-history')">سجل الزيارات</button>
        </div>
    </div>
    <div class="content-area" id="display-frame">
        <b id="frame-title" style="font-size:12px; color:var(--nav-purple-dark); display:block; margin-bottom:10px;">🛒 سجل الطلبات</b>
        <div id="table-content"></div>
    </div>
</div>

<div class="activity-log-section">
    <div class="activity-log-title">سجل نشاط تفاصيل العميل</div>
    <div id="activityList" class="activity-list"></div>
</div>

<script src="customer-details.js"></script>
</body>
</html>
