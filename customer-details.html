<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العميل - ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="customers.css">
    <style>
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-soft);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.05);
            max-width: 900px;
            margin: 20px auto;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }
        .form-header {
            font-size: 16px;
            font-weight: 800;
            color: #2e1065;
            border-bottom: 2px solid var(--border-soft);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        @media (max-width: 768px) {
            .form-group.full-width { grid-column: span 1; }
        }
        .form-label {
            font-weight: 700;
            font-size: 11.5px;
            color: var(--text-dark);
        }
        .form-input {
            height: 38px;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
            font-family: 'Cairo';
            font-size: 12px;
            outline: none;
            transition: .2s;
        }
        .form-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,.1);
        }
        .form-input[readonly] {
            background-color: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .section-divider {
            grid-column: span 2;
            font-size: 13px;
            font-weight: 800;
            color: #4c1d95;
            margin-top: 15px;
            padding-bottom: 5px;
            border-bottom: 1px dashed var(--border-soft);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @media (max-width: 768px) {
            .section-divider { grid-column: span 1; }
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eff6ff;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed var(--accent-blue);
        }
        .btn-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html" class="active">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-user-edit"></i> <span id="pageTitle">تفاصيل العميل</span>
        </div>

        <div class="form-grid">
            <!-- القسم الأول: بيانات المنشأة -->
            <div class="form-group">
                <label class="form-label">كود العميل</label>
                <input type="text" id="custCode" class="form-input" readonly>
            </div>
            <div class="form-group">
                <label class="form-label">تاريخ الإنشاء</label>
                <input type="text" id="custDate" class="form-input" readonly>
            </div>
            <div class="form-group full-width">
                <label class="form-label">اسم الشركة <span style="color:red;">*</span></label>
                <input type="text" id="compName" class="form-input" placeholder="أدخل اسم الشركة الرسمي">
            </div>
            <div class="form-group full-width">
                <label class="form-label">العنوان</label>
                <input type="text" id="custAddress" class="form-input" placeholder="مثال: الرياض - حي السلي">
            </div>
            <div class="form-group">
                <label class="form-label">تصنيف العميل</label>
                <select id="custClassification" class="form-input">
                    <option value="">-</option>
                    <option value="حكومي">حكومي</option>
                    <option value="مهم">مهم</option>
                    <option value="متوسط">متوسط</option>
                    <option value="صغير">صغير</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">حالة العميل</label>
                <select id="custStatus" class="form-input">
                    <option value="">-</option>
                    <option value="نشط">نشط</option>
                    <option value="غير نشط">غير نشط</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label class="form-label">المالك</label>
                <input type="text" id="custOwner" class="form-input" placeholder="اسم مسؤول الحساب">
            </div>

            <!-- القسم الثاني: بيانات المسؤول الرئيسي -->
            <div class="section-divider">
                <i class="fas fa-user-tie"></i> بيانات المسؤول الرئيسي للمنشأة
            </div>
            <div class="form-group">
                <label class="form-label">اسم المسؤول</label>
                <input type="text" id="mainMgr" class="form-input" placeholder="الاسم الثنائي أو الثلاثي">
            </div>
            <div class="form-group">
                <label class="form-label">رقم التواصل</label>
                <input type="text" id="mainMob" class="form-input" placeholder="05xxxxxxxx" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>
            <div class="form-group full-width">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="mainEmail" class="form-input" placeholder="example@domain.com">
            </div>

            <!-- القسم الثالث: بيانات المفوض -->
            <div class="section-divider">
                <i class="fas fa-user-shield"></i> بيانات المفوض (إن وجد)
            </div>
            <div class="form-group">
                <label class="form-label">اسم المفوض</label>
                <input type="text" id="delegateName" class="form-input" placeholder="اسم الشخص المفوض">
            </div>
            <div class="form-group">
                <label class="form-label">رقم تواصل المفوض</label>
                <input type="text" id="delegateMob" class="form-input" placeholder="05xxxxxxxx" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>
            <div class="form-group full-width">
                <label class="form-label">البريد الإلكتروني للمفوض</label>
                <input type="email" id="delegateEmail" class="form-input" placeholder="delegate@domain.com">
            </div>
            
            <!-- خيار تفعيل الأولوية للمفوض -->
            <div class="form-group full-width checkbox-group">
                <input type="checkbox" id="delegatePriority" style="width:16px; height:16px; cursor:pointer;">
                <label for="delegatePriority" class="form-label" style="cursor:pointer; margin:0; color:#1e3a8a;">منح المفوض الأولوية الكاملة في العرض على جدول صفحة العملاء الرئيسية</label>
            </div>
        </div>

        <div class="btn-actions">
            <button onclick="window.location.href='customers.html'" style="background:#f1f5f9; border:1px solid #cbd5e1; color:#475569; padding:10px 24px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:12px; font-weight:700;">إلغاء والعودة</button>
            <button onclick="saveCustomerChanges()" style="background:var(--accent-blue); border:none; color:white; padding:10px 30px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:12px; font-weight:800; box-shadow: 0 2px 4px rgba(59,130,246,0.3);"><i class="fas fa-save"></i> حفظ التعديلات</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'asgate_customers_final_v2';
    const LOGS_KEY = 'asgate_customers_logs_v2';

    let currentCode = '';
    let isEditMode = false;
    let existingNotes = '[]';
    let creationDate = '';

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code && code !== 'new') {
            isEditMode = true;
            currentCode = code;
            document.getElementById('pageTitle').innerText = 'تعديل تفاصيل العميل كود (' + code + ')';
            loadCustomerData(code);
        } else {
            isEditMode = false;
            document.getElementById('pageTitle').innerText = 'إضافة عميل جديد للنظام';
            currentCode = generateNextCode();
            document.getElementById('custCode').value = currentCode;
            creationDate = new Date().toISOString().split('T')[0];
            document.getElementById('custDate').value = creationDate;
        }
    }

    function generateNextCode() {
        const rawData = localStorage.getItem(STORAGE_KEY);
        let maxNum = 0;
        if (rawData) {
            try {
                const list = JSON.parse(rawData);
                if (Array.isArray(list)) {
                    list.forEach(c => {
                        const num = parseInt(c.code, 10);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    });
                }
            } catch(e) {}
        }
        return String(maxNum + 1).padStart(5, '0');
    }

    function loadCustomerData(code) {
        const rawData = localStorage.getItem(STORAGE_KEY);
        if (!rawData) return;
        try {
            const list = JSON.parse(rawData);
            const cust = list.find(c => c.code === code);
            if (cust) {
                document.getElementById('custCode').value = cust.code;
                document.getElementById('compName').value = cust.comp || '';
                document.getElementById('custAddress').value = cust.address || '';
                document.getElementById('custClassification').value = cust.classification || '';
                document.getElementById('custStatus').value = cust.status || '';
                document.getElementById('custOwner').value = cust.owner || '';
                
                document.getElementById('mainMgr').value = cust.mgr || '';
                document.getElementById('mainMob').value = cust.mob || '';
                document.getElementById('mainEmail').value = cust.email || '';
                
                document.getElementById('delegateName').value = cust.delegateName || '';
                document.getElementById('delegateMob').value = cust.delegateMob || '';
                document.getElementById('delegateEmail').value = cust.delegateEmail || '';
                document.getElementById('delegatePriority').checked = !!cust.delegatePriority;
                
                existingNotes = cust.notes || '[]';
                creationDate = cust.creationDate || '';
                document.getElementById('custDate').value = creationDate;
            }
        } catch(e) {}
    }

    function saveCustomerChanges() {
        const comp = document.getElementById('compName').value.trim();
        if (!comp) {
            Swal.fire({ icon: 'error', text: 'يرجى إدخال اسم الشركة الأساسي لحفظ الملف', confirmButtonText: 'حسناً', confirmButtonColor: '#3b82f6' });
            return;
        }

        const rawData = localStorage.getItem(STORAGE_KEY);
        let list = [];
        if (rawData) {
            try { list = JSON.parse(rawData); } catch(e) {}
        }

        const custData = {
            code: currentCode,
            comp: comp,
            address: document.getElementById('custAddress').value.trim(),
            classification: document.getElementById('custClassification').value,
            status: document.getElementById('custStatus').value,
            owner: document.getElementById('custOwner').value.trim(),
            mgr: document.getElementById('mainMgr').value.trim(),
            mob: document.getElementById('mainMob').value.trim(),
            email: document.getElementById('mainEmail').value.trim(),
            delegateName: document.getElementById('delegateName').value.trim(),
            delegateMob: document.getElementById('delegateMob').value.trim(),
            delegateEmail: document.getElementById('delegateEmail').value.trim(),
            delegatePriority: document.getElementById('delegatePriority').checked,
            notes: existingNotes,
            creationDate: creationDate
        };

        if (isEditMode) {
            const idx = list.findIndex(c => c.code === currentCode);
            if (idx !== -1) {
                list[idx] = custData;
                addToActivityLog('إجراء', 'تعديل بيانات ملف العميل تفصيلياً', '', comp);
            }
        } else {
            list.unshift(custData);
            addToActivityLog('إجراء', 'إنشاء ملف تفصيلي لعميل جديد', '', comp);
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        
        Swal.fire({
            icon: 'success',
            title: 'تم حفظ التعديلات بنجاح',
            showConfirmButton: false,
            timer: 1300
        }).then(() => {
            window.location.href = 'customers.html';
        });
    }

    function addToActivityLog(fieldName, oldVal, newVal, companyName) {
        const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت']; 
        const d = new Date(); 
        let dd = String(d.getDate()).padStart(2, '0'), mm = String(d.getMonth() + 1).padStart(2, '0'), yyyy = d.getFullYear(); 
        const dayName = days[d.getDay()];
        const timeStr = String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0');
        const cleanCompany = companyName || 'شركة غير مسماة'; 
        let actionText = `${oldVal} ( ${cleanCompany} )`; 
        
        const fullLogHTML = `
            <div class="log-entry">
                <span class="log-badge-user"><i class="fas fa-user-circle"></i> المستخدم</span>
                <span class="log-divider">|</span>
                <span class="log-timestamp"><i class="fas fa-clock"></i> ${dayName} ${yyyy}-${mm}-${dd} ${timeStr}</span>
                <span class="log-divider">|</span>
                <span class="log-action">${actionText}</span>
            </div>
        `; 
        let logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]'); 
        logs.unshift(fullLogHTML); 
        localStorage.setItem(LOGS_KEY, JSON.stringify(logs.slice(0, 100))); 
    }
</script>

</body>
</html>
