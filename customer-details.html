<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASGate - تفاصيل العميل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="customer-details.css" />
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">AS</div>
        <div class="brand-text">
          <h1>ASGate</h1>
          <span>تفاصيل العميل</span>
        </div>
      </div>

      <button class="back-btn" onclick="goBackAndFocus()">← العودة للعملاء</button>

      <nav class="menu">
        <button class="tab-btn active" id="btn-o" onclick="openTab('o-history')">الأوامر / الطلبات</button>
        <button class="tab-btn" id="btn-v" onclick="openTab('v-history')">سجل الزيارات</button>
        <button class="tab-btn" id="btn-a" onclick="openTab('attachments')">المرفقات</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h2 id="c-name">تفاصيل العميل</h2>
          <p>عرض شامل لبيانات العميل وسجلاته المرتبطة</p>
        </div>
      </header>

      <section class="client-card">
        <div class="client-grid">
          <div class="info-box"><span>السجل التجاري 1</span><strong id="c-cr1">-</strong></div>
          <div class="info-box"><span>السجل التجاري 2</span><strong id="c-cr2">-</strong></div>
          <div class="info-box"><span>المدينة</span><strong id="c-city">-</strong></div>
          <div class="info-box"><span>الحي</span><strong id="c-district">-</strong></div>
          <div class="info-box"><span>المصدر</span><strong id="c-source">-</strong></div>
          <div class="info-box"><span>المالك</span><strong id="c-owner">-</strong></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3 id="tabTitle">الأوامر / الطلبات</h3>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr id="tableHeadRow">
                <th>التاريخ</th>
                <th>العنوان</th>
                <th>الحالة</th>
                <th>الملاحظات</th>
              </tr>
            </thead>
            <tbody id="contentBody">
              <!-- content injected by JS -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>فريق المتابعة</h3>
          <button class="btn btn-primary" onclick="addNewManagerRow()">+ إضافة متابعة</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>المسؤول</th>
                <th>الجوال</th>
                <th>البريد</th>
                <th>الأساسي</th>
                <th>تاريخ الإضافة</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="managerTableBody">
              <!-- managers injected by JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="customer-details.js"></script>
</body>
</html>
