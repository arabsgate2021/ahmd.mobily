<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة عميل جديد - ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="customers.css">
    <style>
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-soft);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.05);
            max-width: 900px;
            margin: 20px auto;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }
        .form-header {
            font-size: 16px;
            font-weight: 800;
            color: #2e1065;
            border-bottom: 2px solid var(--border-soft);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        @media (max-width: 768px) {
            .form-group.full-width { grid-column: span 1; }
        }
        .form-label {
            font-weight: 700;
            font-size: 11.5px;
            color: var(--text-dark);
        }
        .form-input {
            height: 38px;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
            font-family: 'Cairo';
            font-size: 12px;
            outline: none;
            transition: .2s;
        }
        .form-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,.1);
        }
        .form-input[readonly] {
            background-color: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
            font-weight: 800;
        }
        .btn-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html" class="active">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-user-plus"></i> <span id="pageTitle">إضافة عميل جديد</span>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">كود العميل</label>
                <input type="text" id="custCode" class="form-input" readonly>
            </div>
            <div class="form-group">
                <label class="form-label">تاريخ الانشاء</label>
                <input type="text" id="custDate" class="form-input" readonly>
            </div>

            <div class="form-group full-width">
                <label class="form-label">اسم الشركة</label>
                <input type="text" id="compName" class="form-input" placeholder="أدخل اسم الشركة">
            </div>

            <div class="form-group">
                <label class="form-label">المدينة</label>
                <input type="text" id="city" class="form-input" placeholder="المدينة">
            </div>
            <div class="form-group">
                <label class="form-label">العنوان</label>
                <input type="text" id="address" class="form-input" placeholder="العنوان التفصيلي">
            </div>

            <div class="form-group">
                <label class="form-label">رقم السجل الرئيسي</label>
                <input type="text" id="mainCR" class="form-input" placeholder="السجل الرئيسي" onblur="checkDuplicateCR()">
            </div>
            <div class="form-group">
                <label class="form-label">رقم السجل</label>
                <input type="text" id="subCR" class="form-input" placeholder="رقم السجل الفرعي" onblur="checkDuplicateCR()">
            </div>

            <div class="form-group">
                <label class="form-label">المسؤول</label>
                <input type="text" id="managerName" class="form-input" placeholder="اسم المسؤول">
            </div>
            <div class="form-group">
                <label class="form-label">رقم التواصل</label>
                <input type="text" id="contactNumber" class="form-input" placeholder="رقم الجوال" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>

            <div class="form-group full-width">
                <label class="form-label">البريد الالكتروني</label>
                <input type="email" id="email" class="form-input" placeholder="البريد الالكتروني">
            </div>

            <div class="form-group full-width">
                <label class="form-label">انشأ بواسطة</label>
                <input type="text" id="createdBy" class="form-input" placeholder="اسم المنشئ">
            </div>
        </div>

        <div class="btn-actions">
            <button onclick="window.location.href='customers.html'" style="background:#f1f5f9; border:1px solid #cbd5e1; color:#475569; padding:10px 24px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:12px; font-weight:700;">إلغاء والعودة</button>
            <button onclick="saveCustomerChanges()" style="background:var(--accent-blue); border:none; color:white; padding:10px 30px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:12px; font-weight:800; box-shadow: 0 2px 4px rgba(59,130,246,0.3);"><i class="fas fa-save"></i> حفظ البيانات</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'asgate_customers_final_v2';

    let currentCode = '';
    let isEditMode = false;
    let existingNotes = '[]';
    let creationDate = '';

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code && code !== 'new') {
            isEditMode = true;
            currentCode = code;
            document.getElementById('pageTitle').innerText = 'تعديل تفاصيل العميل كود (' + code + ')';
            loadCustomerData(code);
        } else {
            isEditMode = false;
            document.getElementById('pageTitle').innerText = 'إضافة عميل جديد';
            currentCode = generateNextCode();
            document.getElementById('custCode').value = currentCode;
            creationDate = new Date().toISOString().split('T')[0];
            document.getElementById('custDate').value = creationDate;
        }
    }

    function generateNextCode() {
        const rawData = localStorage.getItem(STORAGE_KEY);
        let maxNum = 0;
        if (rawData) {
            try {
                const list = JSON.parse(rawData);
                if (Array.isArray(list)) {
                    list.forEach(c => {
                        const num = parseInt(c.code, 10);
                        if (!isNaN(num) && num > maxNum) maxNum = num;
                    });
                }
            } catch(e) {}
        }
        return String(maxNum + 1).padStart(5, '0');
    }

    // دالة التحقق من تكرار السجل التجاري
    function checkDuplicateCR() {
        const mainCR = document.getElementById('mainCR').value.trim();
        const subCR = document.getElementById('subCR').value.trim();
        
        if (!mainCR && !subCR) return false;

        const rawData = localStorage.getItem(STORAGE_KEY);
        if (rawData) {
            const list = JSON.parse(rawData);
            const isDuplicate = list.find(c => 
                (c.code !== currentCode) && 
                ((mainCR && (c.mainCR === mainCR || c.subCR === mainCR)) || 
                 (subCR && (c.mainCR === subCR || c.subCR === subCR)))
            );

            if (isDuplicate) {
                Swal.fire({
                    icon: 'error',
                    title: 'تنبيه',
                    text: 'العميل مسجل بالفعل',
                    confirmButtonText: 'حسناً',
                    confirmButtonColor: '#3b82f6'
                });
                return true;
            }
        }
        return false;
    }

    function loadCustomerData(code) {
        const rawData = localStorage.getItem(STORAGE_KEY);
        if (!rawData) return;
        try {
            const list = JSON.parse(rawData);
            const cust = list.find(c => c.code === code);
            if (cust) {
                document.getElementById('custCode').value = cust.code;
                document.getElementById('compName').value = cust.comp || '';
                document.getElementById('city').value = cust.city || '';
                document.getElementById('address').value = cust.address || '';
                document.getElementById('mainCR').value = cust.mainCR || '';
                document.getElementById('subCR').value = cust.subCR || '';
                document.getElementById('managerName').value = cust.mgr || '';
                document.getElementById('contactNumber').value = cust.mob || '';
                document.getElementById('email').value = cust.email || '';
                document.getElementById('createdBy').value = cust.owner || '';
                
                existingNotes = cust.notes || '[]';
                creationDate = cust.creationDate || '';
                document.getElementById('custDate').value = creationDate;
            }
        } catch(e) {}
    }

    function saveCustomerChanges() {
        // التحقق من تكرار السجل قبل الحفظ
        if (checkDuplicateCR()) return;

        const comp = document.getElementById('compName').value.trim();
        if (!comp) {
            Swal.fire({ icon: 'error', text: 'يرجى إدخال اسم الشركة', confirmButtonText: 'حسناً', confirmButtonColor: '#3b82f6' });
            return;
        }

        const rawData = localStorage.getItem(STORAGE_KEY);
        let list = [];
        if (rawData) {
            try { list = JSON.parse(rawData); } catch(e) {}
        }

        // تم ربط الحقول بنفس المسميات التي يستخدمها كود (العملاء) للجدول
        const custData = {
            code: currentCode,
            creationDate: creationDate,
            comp: comp,
            city: document.getElementById('city').value.trim(),
            address: document.getElementById('address').value.trim(),
            mainCR: document.getElementById('mainCR').value.trim(),
            subCR: document.getElementById('subCR').value.trim(),
            mgr: document.getElementById('managerName').value.trim(),
            mob: document.getElementById('contactNumber').value.trim(),
            email: document.getElementById('email').value.trim(),
            owner: document.getElementById('createdBy').value.trim(),
            notes: existingNotes
        };

        if (isEditMode) {
            const idx = list.findIndex(c => c.code === currentCode);
            if (idx !== -1) {
                list[idx] = custData;
            }
        } else {
            list.unshift(custData);
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        
        Swal.fire({
            icon: 'success',
            title: 'تم حفظ البيانات بنجاح',
            showConfirmButton: false,
            timer: 1300
        }).then(() => {
            window.location.href = 'customers.html';
        });
    }
</script>

</body>
</html>
