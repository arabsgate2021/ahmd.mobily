<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - المبيعات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="visits.css">
    <style>
        /* تنبيهات التواريخ لصفحة المبيعات */
        .date-alert-danger { background-color: #fee2e2 !important; color: #991b1b !important; font-weight: 800; border: 1px solid #f87171; }
        .date-alert-warning { background-color: #fef08a !important; color: #854d0e !important; font-weight: 800; }
        .date-alert-safe { background-color: #dcfce7 !important; color: #065f46 !important; font-weight: 800; }
    </style>
</head>
<body onload="loadSavedData()">

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
        <a href="sales.html" class="active">المبيعات</a>
    </nav>

    <div class="main-content">
        <div class="action-bar">
            <!-- تم إزالة زر إضافة مبيعات يدوية للحفاظ على النظام -->
            <div class="search-wrapper" style="width: 30%;">
                <input type="text" id="searchInput" class="search-input" placeholder="بحث في المبيعات 🔍" onkeyup="debouncedFilterTable()">
            </div>
            
            <div class="stats-bar-visit">
                <div class="stat-item">إجمالي المبيعات: <span id="stat-value-total" class="stat-val" style="color: #059669; background: #ecfdf5;">0</span></div>
                <div class="stat-item">مبيعات الشهر: <span id="stat-value-month" class="stat-val" style="color: #059669; background: #ecfdf5;">0</span></div>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-select"><input type="checkbox" onclick="toggleAllCheckboxes(this)"></th>
                        <th class="col-company">الشركة</th>
                        <th class="col-manager">المسؤول</th>
                        <th class="col-mobile">الرقم</th>
                        <th class="col-val">القيمة</th>
                        <th class="col-date">تاريخ الإغلاق المتوقع</th>
                        <th class="col-notes">الملاحظات</th>
                        <th class="col-status">حالة البيع</th>
                        <th class="col-edit">آخر تعديل</th>
                        <th class="col-owner">المالك</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="activityLogSection" class="activity-log-section">
            <div class="activity-log-header-container">
                <div class="activity-log-title"><i class="fas fa-history"></i> سجل نشاط المبيعات</div>
                <button id="toggleExpandBtn" class="btn-toggle-expand" onclick="toggleLogExpansion()"><i class="fas fa-expand-alt"></i></button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>
</div>

<!-- مودال الملاحظات (نفس كود الزيارات تماماً) -->
<div id="noteModal" class="modal-notes">...</div>

<script src="sales.js"></script>
</body>
</html>
