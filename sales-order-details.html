<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل طلب المبيعات | ASGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sales-order-details.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
</head>
<body onload="loadOrderDetails()">

    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html">العملاء</a>
        <a href="sales.html" class="active">المبيعات</a>
    </nav>

    <div class="container">
        <div class="sticky-top-section">
            <div class="header-section-wrapper">
                <a href="sales.html" class="btn-back-outside">عودة</a>
                <div class="order-header-info">
                    <div class="info-item"><span class="info-label">رقم الطلب</span><span class="info-value" id="orderId">#0000</span></div>
                    <div class="info-item info-item-highlight"><span class="info-label">اسم الطلب</span><span class="info-value" id="orderType">-</span></div>
                    <div class="info-item"><span class="info-label">الشركة</span><span class="info-value" id="orderComp">-</span></div>
                    <div class="info-item"><span class="info-label">السجل</span><span class="info-value" id="orderCr">-</span></div>
                    <div class="info-item"><span class="info-label">حالة الطلب</span><span class="info-value" id="orderStatus">-</span></div>
                    <div class="info-item"><span class="info-label">قيمة الطلب</span><span class="info-value" id="orderTotalSum">0.0 ر.س</span></div>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-add" onclick="openModal()">+ إضافة منتج جديد</button>
                <div class="search-wrapper">
                    <input type="text" id="liveSearch" class="search-input" placeholder="بحث بالسريال أو الخدمة أو هوية المستخدم..." onkeyup="applyFilters()">
                </div>
                
                <div class="stats-container">
                    <div class="stats-box right-box">
                        <span class="stat-label">الاجمالي</span>
                        <span>مكتمل: <span id="stat_total_ok" class="stat-val-green">0.0</span></span>
                        <span>معلق: <span id="stat_total_wait" class="stat-val-orange">0.0</span></span>
                    </div>
                    <div class="stats-box left-box">
                        <span class="stat-label">الشهر</span>
                        <span>مكتمل: <span id="stat_month_ok" class="stat-val-green">0.0</span></span>
                        <span>معلق: <span id="stat_month_wait" class="stat-val-orange">0.0</span></span>
                    </div>
                </div>

                <div class="dropdown">
                    <button class="btn-action">إجراء ⚙️</button>
                    <div class="dropdown-content">
                        <button onclick="triggerActionLog('تعديل البيانات الأساسية للطلب')">تعديل</button>
                        <button onclick="triggerActionLog('تصدير Excel')">تصدير Excel</button>
                        <button onclick="triggerActionLog('طباعة')">طباعة</button>
                        <button style="color:red;" onclick="triggerActionLog('حذف المختار')">حذف المختار</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr id="dynamicHeader"></tr>
                </thead>
                <tbody id="productsBody"></tbody>
                <tfoot>
                    <tr class="table-footer">
                        <td id="f_selection">0</td> 
                        <td id="f_count">0</td>
                        <td></td>
                        <td id="f_qty">0</td>
                        <td id="f_sub">0.0</td>
                        <td id="f_total">0.0</td>
                        <td colspan="6"></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="activity-log-section" id="activityLogSection">
            <div class="activity-log-header-container">
                <div class="activity-log-title">📋 سجل نشاط تفاصيل الطلب</div>
                <button class="btn-toggle-expand" onclick="toggleLogHeight()" title="توسيع / تقليص" id="toggleExpandBtn">⤢</button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>

    <div id="noteModal" class="modal-notes">
        <div class="modal-notes-content">
            <div style="font-weight: 800; color: #2e1065; margin-bottom: 12px; text-align: right;">سجل ملاحظات ومتابعة المنتج</div>
            <div id="historyLog" class="history-log"></div>
            <textarea id="modalTextArea" class="note-area" placeholder="أضف ملاحظة جديدة بخصوص هذا المنتج..."></textarea>
            <div style="display:flex; justify-content: flex-end; gap:8px; margin-top:10px;">
                <button onclick="closeNote()" style="background:#94a3b8; border:none; color:white; padding:8px 18px; border-radius:8px; cursor:pointer; font-family:Cairo; font-size:12px;">إلغاء</button>
                <button onclick="saveNote()" style="background:#22c55e; border:none; color:white; padding:8px 18px; border-radius:8px; cursor:pointer; font-family:Cairo; font-size:12px; font-weight:bold;">تحديث الملاحظات</button>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3>إضافة منتج جديد</h3>
            
            <label style="font-size: 11px; font-weight: bold; color: #64748b;">نوع المنتج</label>
            <select id="p_type" onchange="handleTypeChange()">
                <option value="جوال">جوال</option>
                <option value="بيانات">بيانات</option>
                <option value="هاتف">هاتف</option>
                <option value="فايبر">فايبر</option>
                <option value="DIA">DIA</option>
                <option value="SIP Trunk">SIP Trunk</option>
                <option value="Ipvpn">Ipvpn</option>
            </select>
            
            <label style="font-size: 11px; font-weight: bold; color: #64748b;">تفاصيل المنتج</label>
            <input type="text" id="p_name" placeholder="تفاصيل المنتج (مثال: باقة 200 جيجا)">
            
            <div class="form-row-grid">
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #64748b;">قيمة الاشتراك</label>
                    <input type="text" id="p_sub" placeholder="قيمة الاشتراك" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');">
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #64748b;">العدد</label>
                    <input type="text" id="p_qty" value="1" placeholder="العدد" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                </div>
            </div>
            
            <label style="font-size: 11px; font-weight: bold; color: #64748b;">السريال</label>
            <div class="serial-wrapper">
                <input type="text" id="p_serial" placeholder="السريال" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                <div class="auto-serial-container">
                    <input type="checkbox" id="auto_serial">
                    <label for="auto_serial">تسلسل تلقائي</label>
                </div>
            </div>
            
            <div style="display:flex; gap:10px; margin-top: 5px;">
                <button class="btn" style="flex:1; background:var(--header-green); justify-content:center;" onclick="saveProduct()">حفظ</button>
                <button class="btn" style="flex:1; background:var(--danger-red); justify-content:center;" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="sales-order-details.js"></script>
</body>
</html>
