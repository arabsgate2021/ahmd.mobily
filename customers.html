<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- الربط بملف التنسيق الموحد -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html" class="active">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="main-content">
        <div class="action-bar">
            <button class="btn-top btn-add" onclick="insertNewCustomerRow()">+ إضافة عميل جديد</button>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="بحث 🔍" onkeyup="filterCustomersTable()">
            </div>
            
            <div class="stats-bar">
                <div class="stat-item">إجمالي العملاء: <span id="stat-total" class="stat-val">0</span></div>
                <div class="stat-item">عملاء الشهر: <span id="stat-month" class="stat-val">0</span></div>
                <div class="stat-item">عملاء اليوم: <span id="stat-today" class="stat-val">0</span></div>
            </div>

            <div class="bulk-action-wrapper">
                <button class="btn-bulk-trigger" onclick="toggleDropdown(event, this)">إجراء ▾</button>
                <div class="dropdown-menu">
                    <button onclick="handleCustomerBulkAction('تغيير المالك')">تغيير المالك</button>
                    <button onclick="handleCustomerBulkAction('تعديل')">تعديل</button>
                    <button onclick="handleCustomerBulkAction('تصدير')">تصدير</button>
                    <button onclick="handleCustomerBulkAction('طباعة')">طباعة</button>
                    <button class="del-btn" onclick="handleCustomerBulkAction('حذف')">حذف</button>
                </div>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-select"><input type="checkbox" onclick="toggleAllCheckboxes(this)"></th>
                        <th class="col-id">ID</th>
                        <th class="col-company">اسم المنشأة / الشركة</th>
                        <th class="col-address">العنوان</th> 
                        <th class="col-records">السجل الرئيسي</th>
                        <th class="col-contact">الشخص المسؤول</th>
                        <th class="col-phone">رقم التواصل</th>
                        <th class="col-email">البريد الإلكتروني</th>
                        <th class="col-type">التصنيف</th>
                        <th class="col-status">الحالة</th>
                        <th class="col-notes">سجل المتابعة</th>
                        <th class="col-created">تاريخ الإنشاء</th>
                        <th class="col-owner">المالك</th>
                    </tr>
                </thead>
                <!-- تم وضع ID خاص لجدول العملاء ليتعرف عليه الـ JavaScript الموحد -->
                <tbody id="customersBody"></tbody>
            </table>
        </div>

        <div class="activity-log-section" id="custActivityLogSection">
            <div class="activity-log-header-container">
                <div class="activity-log-title">📋 سجل نشاط إدارة العملاء</div>
                <button class="btn-toggle-expand" onclick="toggleActivityLogHeight()" title="توسيع / تقليص" id="toggleLogBtn">⤢</button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>
</div>

<div id="noteModal" class="modal">
    <div class="modal-content">
        <div style="font-weight: 800; color: #4c1d95; font-size:13px; margin-bottom: 12px; text-align: center;">سجل ملاحظات ومتابعة</div>
        <div id="historyLog" class="history-log"></div>
        <textarea id="modalTextArea" class="note-area" placeholder="أضف ملاحظة جديدة..."></textarea>
        <div style="display:flex; justify-content: flex-end; gap:8px; margin-top:12px;">
            <button onclick="closeNote()" style="background:#94a3b8; border:none; color:white; padding:6px 16px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:11.5px;">إلغاء</button>
            <button onclick="saveNote()" style="background:#22c55e; border:none; color:white; padding:6px 16px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:11.5px; font-weight:bold;">تحديث الملاحظات</button>
        </div>
    </div>
</div>

<!-- الربط بملف الجافاسكربت الموحد -->
<script src="script.js"></script>
</body>
</html>
