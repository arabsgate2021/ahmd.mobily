<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="customers.css">
</head>
<body onload="loadSavedData()">

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html" class="active">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="main-content">
        <div class="action-bar">
            <button class="btn-top btn-add" onclick="insertNewRow()"><i class="fas fa-plus"></i> إضافة عميل جديد</button>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="بحث 🔍" onkeyup="debouncedFilterTable()">
            </div>
            
            <div class="stats-bar-visit">
                <div class="stat-item">إجمالي العملاء: <span id="stat-total" class="stat-val">0</span></div>
                <div class="stat-item">عملاء الشهر: <span id="stat-month" class="stat-val">0</span></div>
                <div class="stat-item">عملاء اليوم: <span id="stat-today" class="stat-val">0</span></div>
            </div>

            <div class="bulk-action-wrapper">
                <button class="btn-bulk-trigger" onclick="toggleDropdown(event, this)">إجراءات جماعية <i class="fas fa-chevron-down" style="font-size:10px;"></i></button>
                <div class="dropdown-menu">
                    <button onclick="handleBulkAction('تغيير المالك')"><i class="fas fa-user-edit"></i> تغيير المالك</button>
                    <button onclick="handleBulkAction('تصدير')"><i class="fas fa-file-excel"></i> تصدير للإكسيل</button>
                    <button onclick="handleBulkAction('طباعة')"><i class="fas fa-print"></i> طباعة</button>
                    <hr style="border:none; border-top:1px solid #e2e8f0; margin: 4px 0;">
                    <button class="del-btn" onclick="handleBulkAction('حذف')"><i class="fas fa-trash-alt"></i> حذف المحدد</button>
                </div>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-select"><input type="checkbox" onclick="toggleAllCheckboxes(this)"></th>
                        <th class="col-id">رقم العميل</th>
                        <th class="col-company">الشركة</th>
                        <th class="col-address">العنوان</th>
                        <th class="col-manager">الشخص المسؤول</th>
                        <th class="col-mobile">رقم التواصل</th>
                        <th class="col-email">البريد الإلكتروني</th>
                        <th class="col-record">السجل الرئيسي</th>
                        <th class="col-category">التصنيف</th>
                        <th class="col-status">الحالة</th>
                        <th class="col-notes">سجل المتابعة</th>
                        <th class="col-date">تاريخ الإنشاء</th>
                        <th class="col-owner">المالك</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="activityLogSection" class="activity-log-section">
            <div class="activity-log-header-container">
                <div class="activity-log-title"><i class="fas fa-history"></i> سجل نشاط العملاء</div>
                <button id="toggleExpandBtn" class="btn-toggle-expand" onclick="toggleLogExpansion()" title="توسيع / تقليص"><i class="fas fa-expand-alt"></i></button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>
</div>

<div id="noteModal" class="modal-notes">
    <div class="modal-notes-content">
        <div style="font-weight: 800; color: #1e293b; font-size:14px; margin-bottom: 15px; display:flex; align-items:center; gap:8px;">
            <i class="fas fa-sticky-note" style="color:var(--accent-blue)"></i> سجل ملاحظات ومتابعة العميل
        </div>
        <div id="historyLog" class="history-log"></div>
        <textarea id="modalTextArea" class="note-area" placeholder="أدخل تفاصيل الملاحظة هنا..."></textarea>
        <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeNote()" style="background:#f1f5f9; border:1px solid #cbd5e1; color:#475569; padding:8px 20px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:11.5px; font-weight:700; transition:0.2s;">إلغاء</button>
            <button onclick="saveNote()" style="background:var(--accent-blue); border:none; color:white; padding:8px 20px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:11.5px; font-weight:800; transition:0.2s; box-shadow: 0 2px 4px rgba(59,130,246,0.3);">حفظ الملاحظة</button>
        </div>
    </div>
</div>

<script src="customers.js"></script>

</body>
</html>
