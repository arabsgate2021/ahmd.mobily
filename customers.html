<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - إدارة العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html" class="active">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="main-content">
        <div class="action-bar">
            <button class="btn-top btn-add" onclick="insertNewCustomerRow()">+ إضافة عميل جديد</button>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="بحث 🔍" onkeyup="filterCustomersTable()">
            </div>
            
            <div class="stats-bar-visit" id="statsContainer">
                <div class="stat-item">إجمالي العملاء: <span class="stat-val style-total-val" id="stat-total">0</span></div>
                <div class="stat-divider">|</div>
                <div class="stat-item">عملاء الشهر: <span class="stat-val style-month-val" id="stat-month">0</span></div>
                <div class="stat-divider">|</div>
                <div class="stat-item">عملاء اليوم: <span class="stat-val" id="stat-today">0</span></div>
                <button class="btn-eye-toggle" id="eyeToggleBtn" onclick="toggleStatsVisibility()"><i class="fas fa-eye"></i></button>
            </div>

            <div class="bulk-action-wrapper">
                <button class="btn-bulk-trigger" onclick="toggleDropdown(event, this)">إجراء جماعي <i class="fas fa-chevron-down opacity-chevron"></i></button>
                <div class="dropdown-menu">
                    <button class="del-btn" onclick="handleCustomerBulkAction('حذف')">حذف العميل</button>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-select"><input type="checkbox" onclick="toggleAllCheckboxes(this)"></th>
                        <th style="width: 6%;">ID</th>
                        <th style="width: 15%;">اسم المنشأة الشركة</th>
                        <th style="width: 12%;">العنوان</th>
                        <th style="width: 10%;">السجل الرئيسي</th>
                        <th style="width: 10%;">الشخص المسؤول</th>
                        <th style="width: 11%;">رقم التواصل</th>
                        <th style="width: 12%;">البريد الإلكتروني</th>
                        <th style="width: 7%;">التصنيف</th>
                        <th style="width: 6%;">الحالة</th>
                        <th style="width: 10%;">الملاحظات</th>
                        <th style="width: 8%;">تاريخ الإنشاء</th>
                        <th style="width: 6%;">المالك</th>
                    </tr>
                </thead>
                <tbody id="customersBody">
                    </tbody>
            </table>
        </div>

        <div class="activity-log-section" id="custActivityLogSection">
            <div class="activity-log-header-container">
                <div class="activity-log-title">📋 سجل نشاط إدارة العملاء</div>
                <button class="btn-toggle-expand" onclick="toggleActivityLogHeight()" title="توسيع / تقليص" id="toggleLogBtn">⤢</button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>
</div>

<div id="noteModal" class="modal">
    <div class="modal-notes-content">
        <div class="modal-notes-title-wrapper">
            <i class="fas fa-comments note-icon-color"></i>
            <span>سجل ملاحظات ومتابعة العميل</span>
        </div>
        <div id="historyLog" class="history-log"></div>
        <textarea id="modalTextArea" class="note-area" placeholder="أكتب ملاحظة أو تحديثاً جديداً هنا..."></textarea>
        <div class="modal-actions-wrapper">
            <button onclick="closeNote()" class="btn-modal-cancel">إلغاء</button>
            <button onclick="saveNote()" class="btn-modal-save">حفظ التحديث</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
